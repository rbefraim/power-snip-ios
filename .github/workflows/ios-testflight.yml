name: iOS → TestFlight

# Builds Power Snip! on a GitHub-hosted macOS runner and uploads to TestFlight.
# MANUAL code signing: a distribution cert (.p12) + App Store provisioning profile
# are provided as secrets, so we don't depend on cloud-managed distribution certs.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    # Apple requires the iOS 26 SDK (Xcode 26+) for App Store uploads, so we need a
    # runner image that ships Xcode 26 (macos-15 / macos-26). macos-14 is Xcode 15.
    runs-on: macos-15
    timeout-minutes: 45

    env:
      APP_ID: me.yourplace.powersnip
      SCHEME: App
      PROFILE_NAME: Power Snip App Store
      ASC_KEY_ID:    ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      TEAM_ID:       ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK, required by App Store)
        run: |
          echo "----- Xcodes available on this runner -----"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          # Prefer Xcode 26.x; otherwise fall back to the newest installed Xcode.
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1); fi
          echo "Selecting: $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          echo "iOS SDKs:"; xcodebuild -showsdks | grep -i ios || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps + generate the iOS project
        run: |
          npm install
          npx cap add ios || true
          # Link the CocoaPods statically so there are NO embedded dynamic frameworks
          # in the app bundle. Dynamic frameworks (Capacitor/Cordova/...) each get
          # re-signed at export and reject a provisioning profile, breaking the
          # app-store export. Static linkage removes them from the bundle entirely.
          perl -pi -e 's/^\s*use_frameworks!.*$/use_frameworks! :linkage => :static/' ios/App/Podfile
          echo "----- Podfile linkage -----"; grep -n "use_frameworks" ios/App/Podfile
          npx cap sync ios

      - name: Force landscape orientation + auto-clear export compliance
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:1 string UIInterfaceOrientationLandscapeRight" "$PLIST"
          # The app uses no non-exempt encryption (only standard HTTPS/OS crypto), so
          # declare it here — every build then auto-clears App Store export compliance
          # and goes straight to "Ready to Test" instead of MISSING_EXPORT_COMPLIANCE.
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"

      - name: Install App Store Connect API key (for altool upload)
        run: |
          mkdir -p ~/private_keys
          echo -n "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Import distribution certificate + provisioning profile
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KPW="ci-temp-$RANDOM"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          # keep the login keychain in the search list too
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          echo -n "${{ secrets.DIST_P12_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "${{ secrets.DIST_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          echo "----- signing identities -----"
          security find-identity -v -p codesigning "$KEYCHAIN"
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo -n "${{ secrets.DIST_PROFILE_BASE64 }}" | base64 --decode > "$PP_DIR/PowerSnip_AppStore.mobileprovision"
          echo "installed provisioning profile:"; ls -la "$PP_DIR"

      - name: Scope the profile to the App target only
        run: |
          # The provisioning profile must be set ONLY on the App target — passing
          # PROVISIONING_PROFILE_SPECIFIER globally on the archive CLI applies it to
          # the CocoaPods framework targets too, which reject profiles. So set the
          # App target's manual signing in App.xcodeproj here, and DON'T pass the
          # profile on the CLI (frameworks then sign with just the identity).
          gem install xcodeproj --no-document >/dev/null
          cat > "$RUNNER_TEMP/sign.rb" <<'RUBY'
          require 'xcodeproj'
          proj = Xcodeproj::Project.open('ios/App/App.xcodeproj')
          app = proj.targets.find { |t| t.name == 'App' }
          app.build_configurations.each do |c|
            c.build_settings['CODE_SIGN_STYLE'] = 'Manual'
            c.build_settings['DEVELOPMENT_TEAM'] = ENV['TEAM_ID']
            c.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            c.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'Power Snip App Store'
          end
          proj.save
          puts "App target signing configured (profile scoped)."
          RUBY
          ruby "$RUNNER_TEMP/sign.rb"

      - name: Archive (manual signing)
        run: |
          # NOTE: no PROVISIONING_PROFILE_SPECIFIER here — the App target gets it from
          # the project (previous step); pods sign with the identity, no profile.
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export .ipa (manual, app-store-connect)
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>me.yourplace.powersnip</key><string>Power Snip App Store</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -f "$RUNNER_TEMP/export/App.ipa" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: Save the build for download
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: power-snip-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: ignore
