document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight:430px){[data-screen-label=\"intro\"],[data-screen-label=\"title-screen\"]{zoom:.78}[data-screen-label=\"level-select\"]>*,[data-screen-label=\"win-screen\"]>*,[data-screen-label=\"secrets\"]>*,[data-screen-label=\"unlock-pack\"]>*,[data-screen-label=\"fail-screen\"]>*{zoom:.72}}\n    \u002F* hide desktop keyboard-shortcut hints on touch \u002F coarse-pointer devices (phones, tablets) *\u002F\n    @media (pointer:coarse),(hover:none){.ps-kbd-hint{display:none!important}}\n  <\u002Fstyle>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<\u002Fhelmet>\n<div data-screen-label=\"{{ screenLabel }}\" style=\"position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(130% 150% at 50% -10%, #14505d 0%, #0a2a33 70%);user-select:none;-webkit-user-select:none\">\n  <div style=\"position:absolute;left:50%;top:50%;width:1280px;height:720px;transform:translate(-50%,-50%) scale(var(--psScale,1));transform-origin:center center;overflow:hidden;background:#8fe3ec;box-shadow:0 30px 80px rgba(0,0,0,.45)\">\n    <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none\"><\u002Fcanvas>\n\n    <sc-if value=\"{{ hudOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"hud\" style=\"position:absolute;top:16px;left:18px;right:18px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;gap:12px\">\n        <div style=\"display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.93);border-radius:999px;padding:8px 18px 8px 12px;box-shadow:0 6px 18px rgba(16,49,58,.18)\">\n          <div style=\"width:30px;height:30px;border-radius:999px;background:#ffd23f;display:flex;align-items:center;justify-content:center;font-weight:700;color:#17333a;font-size:15px\">{{ levelNum }}<\u002Fdiv>\n          <div style=\"font-weight:600;color:#17333a;font-size:17px\">{{ levelName }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.93);border-radius:999px;padding:8px 24px;font-weight:700;font-size:20px;color:#17333a;box-shadow:0 6px 18px rgba(16,49,58,.18);font-variant-numeric:tabular-nums;min-width:70px;text-align:center\">{{ timeText }}<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;pointer-events:auto\">\n          <button sc-camel-on-click=\"{{ onRestart }}\" title=\"Restart (R)\" style=\"width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.93);color:#17333a;font-size:20px;font-weight:700;box-shadow:0 6px 18px rgba(16,49,58,.18);display:flex;align-items:center;justify-content:center\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.92)\">↻<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onSelect }}\" title=\"Levels\" style=\"width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.93);color:#17333a;font-size:17px;font-weight:700;box-shadow:0 6px 18px rgba(16,49,58,.18);display:flex;align-items:center;justify-content:center\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.92)\">▦<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onMute }}\" title=\"Sound (M)\" style=\"width:44px;height:44px;border-radius:999px;background:rgba(255,255,255,.93);color:#17333a;font-size:19px;font-weight:700;box-shadow:0 6px 18px rgba(16,49,58,.18);display:flex;align-items:center;justify-content:center\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.92)\">{{ soundGlyph }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ bannerOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);animation:psBanner 1.6s ease forwards;background:rgba(255,255,255,.96);border-radius:24px;padding:18px 48px;box-shadow:0 18px 44px rgba(16,49,58,.28);pointer-events:none;text-align:center\">\n        <div style=\"font-size:14px;font-weight:600;letter-spacing:.28em;color:#6d8f9a;margin-left:.28em\">LEVEL {{ levelNum }}<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:700;color:#17333a;line-height:1.15\">{{ levelName }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ toastOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:50%;bottom:86px;transform:translateX(-50%);background:rgba(23,51,58,.92);color:#eafcff;border-radius:999px;padding:11px 26px;font-size:15.5px;font-weight:600;pointer-events:none;animation:psRise .3s ease both;white-space:nowrap\">{{ toastText }}<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hintOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;left:50%;bottom:26px;transform:translateX(-50%);background:rgba(23,51,58,.8);color:#eafcff;border-radius:999px;padding:11px 28px;font-size:17px;font-weight:500;pointer-events:none;animation:psRise .45s ease both;white-space:nowrap\">{{ hintText }}<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <!-- menu \u002F result \u002F modal overlays: rendered at TRUE viewport size (moved OUT of the scaled 1280x720 game stage so they never shrink, clip, or get inflated by the fit hacks) -->\n\n    <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"intro\" style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(180deg,#0d3540 0%,#12505d 100%);padding:24px;text-align:center\">\n        <div style=\"font-size:14px;font-weight:700;letter-spacing:.3em;color:#8fe3ec;margin-left:.3em\">MAX’S STORY<\u002Fdiv>\n        <canvas ref=\"{{ introRef }}\" style=\"width:min(300px,72vw);height:auto;aspect-ratio:9\u002F5;margin:2px 0;filter:drop-shadow(0 12px 22px rgba(0,0,0,.28))\"><\u002Fcanvas>\n        <div style=\"font-size:clamp(30px,6vw,60px);font-weight:800 <!-- ===== ONE-TIME MUTE RESET (standalone — must NOT be gated by the audio guard) ===== -->
<script>
(function(){
  // Earlier device testing could leave 'power-snip-mastermute' stuck at '1', which silences
  // ALL audio (music + SFX) on that browser forever. A fresh native install has empty storage,
  // which is exactly why the native app still played while the web build went silent.
  // THIS MUST BE STANDALONE: the audio guard below early-returns when window.AudioContext is
  // unavailable (and whenever __psAudioGuard is already set) — putting the reset inside it meant
  // the un-sticking was silently skipped. Verified: on a browser without Web Audio the guard
  // returns before its first line of work, so this reset never ran. It runs unconditionally now,
  // and BEFORE the guard reads the flag. One time per device; a genuine later mute still sticks.
  try {
    var KEY = 'power-snip-mastermute', SAVE = 'power-snip-save', RESET = 'ps-audio-reset-20260721';
    if (localStorage.getItem(RESET) !== '1') {
      localStorage.removeItem(KEY);
      // THE ACTUAL CULPRIT for "no music on web": the GAME keeps its OWN mute inside its save
      // blob -- power-snip-save = {progress, muted} -- and honours it independently of KEY above:
      //   setVol()    -> master.gain.value = state.muted ? 0 : vol   (forces silence)
      //   schedMusic()-> returns early when state.muted               (no music)
      //   tone()/noise()-> return early when state.muted              (no SFX)
      // So a stuck muted:true silences everything even with KEY cleared. Flip it to false while
      // PRESERVING progress (JSON round-trip keeps every other field -- never wipe the save).
      var raw = localStorage.getItem(SAVE);
      if (raw) { var o = JSON.parse(raw); if (o && o.muted) { o.muted = false; localStorage.setItem(SAVE, JSON.stringify(o)); } }
      localStorage.setItem(RESET, '1');
    }
  } catch(e){}
})();
</script>

<!-- ===== Audio guard: auto-pause on tab hide/close + always-visible master mute (v2) ===== -->
<script>
(function(){
  if (window.__psAudioGuard) return; window.__psAudioGuard = 1;
  var CTXS = [];
  var AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  var KEY = 'power-snip-mastermute';
  var muted = false;
  try { muted = localStorage.getItem(KEY) === '1'; } catch(e){}

  // VISIBILITY ONLY. Do NOT factor mute into this. The game mutes by setting its master gain to 0
  // (setVol) — a muted game with a RUNNING context is silent and correct. Previously this also
  // blocked on `muted`, so a stale/stuck mute flag made resume() a permanent no-op → the context
  // NEVER resumed → literally no music/SFX ever, even after unmuting. That was the "no music" bug.
  function shouldSilence(){ return document.hidden; }

  // Wrap AudioContext so we can see every context the game creates.
  var rawResume = AC.prototype.resume;
  var rawSuspend = AC.prototype.suspend;
  AC.prototype.resume = function(){
    // Only refuse while the tab is actually backgrounded. When visible, ALWAYS allow resume so the
    // context can start/continue — mute is a gain concern, not a reason to keep the context asleep.
    if (document.hidden) { return Promise.resolve(); }
    return rawResume.apply(this, arguments);
  };
  function Wrapped(){
    var c = new AC();
    CTXS.push(c);
    if (shouldSilence()) { try { rawSuspend.call(c); } catch(e){} }
    return c;
  }
  Wrapped.prototype = AC.prototype;
  window.AudioContext = Wrapped;
  window.webkitAudioContext = Wrapped;

  function apply(){
    var silence = shouldSilence();
    for (var i=0;i<CTXS.length;i++){
      var c = CTXS[i];
      try {
        if (silence) { if (c.state === 'running') rawSuspend.call(c); }
        // Resume whenever NOT running — iOS Safari backgrounds the audio session to 'interrupted'
        // (a WebKit-specific state), NOT 'suspended'; a 'suspended'-only check left music dead on iOS.
        else { if (c.state !== 'running') rawResume.call(c); }
      } catch(e){}
    }
    var b = document.getElementById('ps-master-mute');
    if (b) {
      b.textContent = muted ? '\u{1F507}' : '\u{1F50A}';
      b.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
      b.setAttribute('aria-pressed', muted ? 'true' : 'false');
      b.style.opacity = muted ? '0.65' : '1';
    }
  }

  function hardStop(){
    for (var i=0;i<CTXS.length;i++){ try { CTXS[i].close(); } catch(e){} }
  }

  document.addEventListener('visibilitychange', apply, false);
  window.addEventListener('blur', apply, false);
  window.addEventListener('focus', apply, false);
  window.addEventListener('pagehide', hardStop, false);
  window.addEventListener('beforeunload', hardStop, false);
  // Safari/iOS bfcache freeze
  document.addEventListener('freeze', apply, true);
  document.addEventListener('resume', apply, true);
  // Belt-and-braces: the game re-creates/resumes audio on its own schedule.
  setInterval(apply, 500);

  // NO separate mute button. The game already has its own ♪ mute in the HUD (top-right); a second
  // always-on mute here was redundant and confusing, and its `muted` flag fed the resume-block that
  // killed audio. Remove any previously-mounted one; the guard is now purely visibility-based.
  function mount(){ var old = document.getElementById('ps-master-mute'); if (old && old.parentNode) old.parentNode.removeChild(old); apply(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount);
  else mount();
  setInterval(mount, 1000);   // ensure it stays gone if the game rebuilds the DOM
})();
</script>

  // ---------- confetti ----------

    var cv = document.createElement('canvas');
    cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
    host.appendChild(cv);
    var ctx = cv.getContext('2d'), W = 0, H = 0, parts = [], raf = 0, t0 = Date.now();
    function size() { W = cv.width = host.clientWidth; H = cv.height = host.clientHeight; }
    size(); window.addEventListener('resize', size);
    var COLORS = ['#ffd23f', '#8be0cf', '#ff9d6b', '#ffffff', '#ff5c8a', '#7ec8ff'];
    function spawn(k) {
      for (var i = 0; i < k; i++) parts.push({
        x: Math.random() * W, y: -20 - Math.random() * H * 0.4,
        vx: (Math.random() - 0.5) * 2.4, vy: 2 + Math.random() * 3.6,
        w: 6 + Math.random() * 7, h: 8 + Math.random() * 10,
        r: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.25,
        c: COLORS[(Math.random() * COLORS.length) | 0]
      });
    }
    spawn(140);
    function tick() {
      ctx.clearRect(0, 0, W, H);
      var el = Date.now() - t0;
      if (el < burstMs && parts.length < 320 && Math.random() < 0.5) spawn(6);
      for (var i = parts.length - 1; i >= 0; i--) {
        var p = parts[i];
        p.x += p.vx; p.y += p.vy; p.r += p.vr; p.vy += 0.035;
        if (p.y > H + 30) { parts.splice(i, 1); continue; }
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
        ctx.fillStyle = p.c; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
      }
      raf = requestAnimationFrame(tick);
    }
    tick();
    return function stop() { cancelAnimationFrame(raf); window.removeEventListener('resize', size); cv.remove(); };
  }

  // ---------- hook the game ----------
  function hook() {
    var p = ps();
    if (!p || !p.LEVELS) return setTimeout(hook, 150);

    // share-unlocked levels bypass the pro wall; beyond that -> choice gate
    var origLoad = p.loadLevel.bind(p);
    p.loadLevel = function (ix, demo) {
      var cap = X().shareCap;
      if (ix >= FREE_LEVELS && !demo && !p.proOK()) {
        if (ix < cap) {                       // granted by sharing
          var op = p.proOK;
          p.proOK = function () { return true; };
          try { origLoad(ix, demo); } finally { p.proOK = op; }
          return;
        }
        showGate('locked');
        return;
      }
      origLoad(ix, demo);
    };

    // level-select tiles reflect share-unlocked levels
    var origRV = p.renderVals.bind(p);
    p.renderVals = function () {
      var v = origRV();
      var cap = X().shareCap;
      if (!p.proOK() && cap > FREE_LEVELS && v.levelTiles) {
        for (var i = FREE_LEVELS; i < Math.min(cap, v.levelTiles.length); i++) {
          var t = v.levelTiles[i];
          t.name = p.LEVELS[i].name; t.bg = '#f2f8f4'; t.op = 1; t.pe = 'auto';
        }
      }
      return v;
    };

    // watch for completion + stuck
    var lastScreen = '', lastLevel = -1;
    setInterval(function () {
      var st2 = p.state; if (!st2) return;
      var scr = st2.screen, lv = st2.level;

      if (scr === 'won' && (scr !== lastScreen || lv !== lastLevel)) {
        var n = p.LEVELS.length;
        var x = X();
        if (lv >= n - 1) {
          if (!x.seen.final) { x.seen.final = 1; saveX(x); }

      // OWN CONTAINER (the stage, menu and PLAY button are all DESCENDANTS of it) — it is NOT a
      // separate layer sitting on top. Two hard rules learned the hard way:
      //   * Make its background TRANSPARENT (not recoloured): the body/html theme gradient then
      //     shows through the pillarbox voids. Background never covers children, so this is safe.
      //   * NEVER set pointer-events:none on it. pointer-events inherits to every descendant, so
      //     pe:none on this container killed ALL taps (PLAY did nothing on iOS) while the game still
      //     rendered. We actively REMOVE any pe override so touch always reaches the game.
      var vw = W.innerWidth, vh = W.innerHeight;
      var divs = D.getElementsByTagName('div');
      for (var j=0;j<divs.length;j++){ var d = divs[j];
        if (d === el) continue;                        // never touch our own overlay
        var tagged = d.getAttribute('data-ps-sky')==='1';
        var b = d.getBoundingClientRect();
        var big = b.width >= vw*0.95 && b.height >= vh*0.95;
        var isBackdrop = tagged;
        if (!isBackdrop && big){
          var cs = getComputedStyle(d);
          isBackdrop = (cs.position==='fixed'||cs.position==='absolute') && cs.backgroundImage.indexOf('radial-gradient')>=0;
        }
        if (!isBackdrop) continue;
        d.style.removeProperty('pointer-events');       // ALWAYS clear any stale pe:none — never disable input on the game container
        if (sky && big){
          d.setAttribute('data-ps-sky','1');
          d.style.setProperty('background','transparent','important');
        } else {                                        // intro/portrait, or the layer went away: restore the game's own backdrop
          d.style.removeProperty('background');
        }
      }
    }catch(e){}
  }
  // ---- STAGE CLEANUP (camera zoom removed) ----------------------------------------------------
  // A previous build ZOOMED the stage by overriding its position/transform (top:auto;bottom:0;
  // transform-origin:50% 100%). On iOS Safari that mispositioned the 1280x720 stage OFF-SCREEN —
  // the whole game (menu + canvas + HUD) vanished, leaving only the fixed backdrop + mute button
  // (exactly Ronen's "horizontal shows nothing but teal" screenshot). The game's OWN centred
  // fit-scale (translate(-50%,-50%) scale(var(--psScale)), driven by CSS) renders reliably on
  // every engine, so we no longer touch the transform. This only STRIPS any stale inline overrides
  // a cached prior build may have left, letting the game's CSS positioning take back over.
  // ---- SAFE CAMERA ZOOM on wide landscape -----------------------------------------------------
  // Make the game bigger by scaling the stage UP + bottom-anchoring the ground, so the active
  // play line fills the frame instead of floating small in dead sky. CRITICAL — this is done the
  // iOS-SAFE way that a previous build got wrong:
  //   * We ONLY override the stage's `transform` (a bigger scale + an outer translateY to bottom-
  //     anchor). We do NOT touch top/left/bottom/position — changing those to `bottom:0` is what
  //     mispositioned the stage OFF-SCREEN on iOS Safari last time (containing-block ambiguity).
  //   * transform-origin stays the game's `center center` (untouched); the maths assumes it.
  //   * reset() RESTORES the game's own transform expression `scale(var(--psScale))` — it must
  //     NOT `removeProperty('transform')` (that inline prop IS the game's only transform, so
  //     removing it drops the stage to an un-scaled 1280x720 box).
  // The zoom is capped per level so NO active element (rope anchor, character, mine/portal/hook,
  // ground) is ever cropped. Input still maps correctly (toWorld reads the live canvas rect); the
  // HUD (a stage child) is re-pinned to the top and stays width-fitted; verified sticking + bottom-
  // anchoring in a REAL browser engine (not just headless) at 2556x1179.
  function findStage(){ var ds=D.getElementsByTagName('div'); for(var i=0;i<ds.length;i++){ if(ds[i].offsetWidth===1280 && ds[i].offsetHeight===720) return ds[i]; } return null; }
  var _zoomOn=false;
  var GAME_TF='translate(-50%,-50%) scale(var(--psScale,1))';   // the game's own stage transform
  // NO-OP for scaling. Container/stage-transform zoom is ABANDONED: it was fragile (caused the iOS
  // blank screen), clipped the menu, and never fixed the real complaint — the OBJECTS are small
  // WITHIN the 1280x720 design, which container scaling can't change. Element sizes are enlarged at
  // the source instead (see the BIGGER SIZES block below). Here we only UNDO any stale transform a
  // previous build left on the stage, then never touch it again.
  function fitStage(){
    try{
      var stage=findStage(); if(!stage || !_zoomOn) return;
      stage.style.setProperty('transform', GAME_TF, '');   // restore the game's own transform (NOT removeProperty)
      var barTop=stage.children&&stage.children[1];
      if(barTop){ barTop.style.removeProperty('transform'); barTop.style.removeProperty('transform-origin'); }
      _zoomOn=false;
    }catch(e){}
  }
  // The game is a self-unpacking bundle that REBUILDS the DOM after load, which would wipe an
  // element appended to <body>. Anchor on <html> (not replaced) and re-attach via a watchdog.
  function ensure(){
    var host = D.body || D.documentElement;
    if (host && el.parentNode !== host) { try { host.appendChild(el); } catch(e){} }
    fitStage();
    applySky();
    update();
  }
  if (D.readyState === 'loading') D.addEventListener('DOMContentLoaded', ensure); else ensure();
  setTimeout(ensure, 0); setTimeout(ensure, 400); setTimeout(ensure, 1200); setTimeout(ensure, 2500);
  setInterval(ensure, 800);
  // React instantly when the game rebuilds the DOM (which wipes/hides our node) so the
  // interstitial can never be caught missing between polls.
  try {
    var mo = new MutationObserver(function(){ ensure(); });
    mo.observe(D.documentElement, { childList:true, subtree:true });
  } catch(e){}
  ['resize','orientationchange','pageshow','focus'].forEach(function(ev){
    W.addEventListener(ev, function(){ ensure(); setTimeout(ensure,150); setTimeout(ensure,450); });
  });
})();</script>
<!-- ===== LEVEL FIX: "The Gauntlet" was UNBEATABLE (runtime data patch, no bundle edit) ===== -->
<script>(function(){
  // The shipped "The Gauntlet" put the robot at x920 with the candy at x320 behind a 3-bomb wall.
  // Cutting the rope in this engine gives the candy almost no horizontal velocity (verified: after a
  // cut the candy's max-x never exceeds its start), so it could NEVER travel 600px to the target —
  // the level was impossible, not merely hard. Replace it with a winnable "drop through the gauntlet"
  // design: a STATIC rope so the candy drops straight down the centre lane, a bomb corridor framing
  // that lane, and Max's mouth directly below. Verified in WebKit: 10/10 cuts deliver the candy.
  // HARDER Gauntlet (Ronen: "too simple"). Same engine reality — the cut candy drops straight down
  // the x240 lane — but now MINES SWEEP horizontally THROUGH that lane at three heights, so the lane is
  // only clear for brief windows. The player must READ the sweep and cut at the right moment, or the
  // snack drops onto a mine. Always beatable (a clear window always comes) so it's a skill test, not a
  // wall; tight star times reward a clean, well-read drop. Verified in headless WebKit (see report).
  var FIX = {
    name: 'The Gauntlet', hint: 'Read the sweeping mines — cut when the lane is clear!', times: [3.8, 5.2],
    robot: { x: 240, y: 600 }, candy: { x: 240, y: 250 },
    ropes: [{ ax: 240, ay: 150 }],
    plats: [{ x: -40, y: 694, w: 1360, h: 60 }],
    bombs: [
      { x: 40, y: 360, motion: { type: 'slide', x2: 440, y2: 360, speed: 300 } },
      { x: 440, y: 470, motion: { type: 'slide', x2: 40, y2: 470, speed: 250 } },
      { x: 40, y: 560, motion: { type: 'slide', x2: 440, y2: 560, speed: 350 } }
    ]
  };
  function apply(){
    try{
      var ps = window.__ps; if(!ps || !ps.LEVELS || !ps.LEVELS.length) return false;
      var i = -1;
      for(var k=0;k<ps.LEVELS.length;k++){ if(ps.LEVELS[k] && ps.LEVELS[k].name==='The Gauntlet'){ i=k; break; } }
      if(i<0) return false;
      if(ps.LEVELS[i].__psFixed) return true;
      var f = JSON.parse(JSON.stringify(FIX)); f.__psFixed = 1;
      ps.LEVELS[i] = f;
      return true;
    }catch(e){ return false; }
  }
  var n=0, iv=setInterval(function(){ if(apply() || ++n>80) clearInterval(iv); }, 200);
})();</script>
<!-- ===== CROSS-PROMO: one tasteful "More games" chip on the MENU (studio + arcade) ===== -->
<script>(function(){
  if (window.__psXpromo) return; window.__psXpromo = 1;
  var W = window, D = document;
  var ARCADE = 'https://themachine-arcade.pages.dev';
  var STUDIO = 'https://themachinegames.pages.dev';
  // Open externally: web -> new tab; Capacitor native -> system browser (Browser plugin, else window.open).
  function openUrl(u){
    try{
      var C = W.Capacitor;
      if (C && C.isNativePlatform && C.isNativePlatform()){
        var B = C.Plugins && C.Plugins.Browser;
        if (B && B.open){ B.open({ url:u }); return; }
      }
    }catch(e){}
    try{ W.open(u, '_blank', 'noopener'); }catch(e){}
  }

    // swallow the pointer stream so a tap here never registers as a rope-cut drag on the canvas
    ['pointerdown','pointerup','touchstart','touchend','mousedown','mouseup','click'].forEach(function(t){
      a.addEventListener(t, function(ev){ ev.stopPropagation(); }, false);

  var el = null;

    box.id = 'ps-xpromo';

    box.style.cssText = [
      'position:fixed','left:50%','top:6px','transform:translateX(-50%)',
      'z-index:2147483001','display:none','align-items:center','gap:8px','max-width:94vw','box-sizing:border-box',
      'padding:7px 15px','border-radius:999px','background:rgba(13,53,64,.82)','backdrop-filter:blur(3px)',
      '-webkit-backdrop-filter:blur(3px)','box-shadow:0 4px 14px rgba(16,49,58,.28)',
      "font-family:'Baloo 2','Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
      'font-size:13px','line-height:1','color:#cfe8ee','-webkit-tap-highlight-color:transparent','pointer-events:auto'
    ].join(';');
    var pre = D.createElement('span');
    pre.textContent = '🕹️ More games:';
    pre.style.cssText = 'font-weight:700;color:#a9d6dd;white-space:nowrap';
    box.appendChild(pre);
    box.appendChild(link('The Machine Arcade', (window.__arcadeUrl ? window.__arcadeUrl() : ARCADE)));
    var dot = D.createElement('span'); dot.textContent = '·'; dot.style.cssText = 'color:#6d8f97'; box.appendChild(dot);
    box.appendChild(link('The Machine Games', STUDIO));
    return box;
  }
  function onMenu(){ return !!(W.__ps && W.__ps.state && W.__ps.state.screen === 'title'); }
  // Place the pill in a DOM-CLEAR vertical band so it never overlaps a menu button/label. Prefer the
  // clear space BELOW every menu element; if the menu fills the bottom (it does on tall phones), tuck
  // the pill just ABOVE the top-most menu element (the sky gap above the tagline). Measured live each
  // time so it adapts to any layout — no fixed bottom that collided with the Share/Rate row.
  function place(){
    try{
      var vh=W.innerHeight, vw=W.innerWidth, ph=el.offsetHeight||34;
      var lowest=0, highest=vh, all=D.querySelectorAll('button,[role=button],h1,h2,h3,p,span');
      for(var i=0;i<all.length;i++){ var n=all[i];
        if(n===el || el.contains(n)) continue;
        if(n.children.length) continue;                          // leaf text / buttons only
        var t=(n.textContent||'').trim(); if(!t) continue;
        var r=n.getBoundingClientRect();
        if(r.width<10 || r.height<6 || r.width>vw*0.96) continue; // skip tiny + full-width containers
        if(r.bottom<=0 || r.top>=vh) continue;
        if(r.bottom>lowest) lowest=r.bottom;
        if(r.top<highest) highest=r.top;
      }
      // Prefer clear room BELOW every menu element; otherwise pin to the very TOP. The top strip holds
      // only ambient canvas art (the shake's thin rope + cloud tops) — NO buttons and NO text labels
      // live there, unlike the crowded middle (the canvas tagline) and bottom (Share/Rate). Tucking
      // "just above the top-most DOM element" landed the pill ON the canvas tagline, so we don't do that.
      var y;
      if(vh - lowest >= ph + 12) y = vh - ph - 10;               // clear room below EVERYTHING
      else y = 6;                                                // else the clear top strip
      el.style.setProperty('top', Math.round(y)+'px','important');
      el.style.setProperty('bottom','auto','important');
    }catch(e){}
  }
  function ensure(){
    try{
      if (!el || !D.body.contains(el)) { el = build(); D.body.appendChild(el); }
      var show = onMenu();
      el.style.setProperty('display', show ? 'flex' : 'none', 'important');
      if (show) place();
    }catch(e){}
  }
  if (D.readyState === 'loading') D.addEventListener('DOMContentLoaded', ensure); else ensure();
  setInterval(ensure, 500);
  // the game rebuilds the DOM (wipes appended nodes) — re-append on mutations
  try { new MutationObserver(ensure).observe(D.documentElement, { childList:true, subtree:true }); } catch(e){}
})();</script>
<!-- ===== BIGGER SIZES — enlarge elements INSIDE the 1280x720 design (NOT a container/stage zoom) ===== -->
<!-- Container/camera scaling was the wrong lever (fragile + just magnifies the same small layout). This
     enlarges the actual sprites and UI at the source: canvas sprites via wrapping the game's own draw
     methods (scale about each sprite's centre — pure visual, physics untouched), and the DOM menu/HUD via
     idempotent inline font/size overrides (original size stashed in data-* so the watchdog never compounds). -->
<script>
(function(){
  var W=window, D=document;
  var SPRITE=1.75;     // gameplay canvas sprite scale (character/obstacles) — unmistakably bigger
  var FOOD=1.5;        // TARGET food visual scale — still bigger than stock, but closer to its hitbox
  var LABEL=1.8;       // its name pill — bigger than before but not dominating the screen
  // FOOD_R was 1.9 and inflated the candy's COLLISION radius (candy.r) 1.9x. That shrank the passable
  // gaps between obstacles — e.g. The Gauntlet's 3-bomb wall (x560, y120/300/520): the safe corridor
  // collapsed from ~76px to ~32px — making obstacle levels effectively unbeatable on a touchscreen.
  // The collision radius MUST stay at the game's ORIGINAL design value so every level keeps the
  // geometry it was balanced and shipped with. 1.0 = no collision change (food still looks bigger via
  // the FOOD draw scale above; visual>hitbox is a lenient near-miss, never an invisible hit).
  var FOOD_R=1.0;      // collision radius unchanged → all 150 levels keep their original, beatable geometry
  var MENU_FS=1.58;    // menu font scale
  var HUD_FS=1.5;      // HUD font/button scale

  // (1) Canvas sprites — wrap the game's draw methods once per __ps instance.
  function wrapSprites(){
    var P=W.__ps; if(!P || P.__psBig) return;
    function wrap(name, getC, sc){ var orig=P[name]; if(typeof orig!=='function') return; sc=sc||SPRITE;
      P[name]=function(){ var a=arguments, ctx=a[0], c=null; try{ c=getC(a,P.g); }catch(e){}
        if(c && ctx && ctx.save){ ctx.save(); try{ ctx.translate(c.x,c.y); ctx.scale(sc,sc); ctx.translate(-c.x,-c.y); return orig.apply(P,a); } finally{ ctx.restore(); } }
        return orig.apply(P,a); }; }
    // Max (drawRobot) is DELIBERATELY NOT scaled here. The game already grows him progressively by
    // stage: stage = min(4, floor(level/4)) (5 at level 23+), driving sw/arm/sc2 up (sc2 1.12→1.62).
    // A flat SPRITE=1.75x on top made him too big from level 1 (Ronen: "Max looks too big when you
    // start — he needs to grow only as he moves through the screens"). Leaving Max unscaled restores
    // start-small-then-grow. (Food/obstacles still get their own scale below.)
    wrap('drawCandy',     function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; }, FOOD);        // the food/target — BIGGER
    wrap('drawFoodLabel', function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; }, LABEL);       // its name pill — bigger
    wrap('drawBomb',  function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });                 // spinning mines
    wrap('drawMagnet',function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });
    wrap('drawFan',   function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });
    wrap('drawPortal',function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });
    wrap('drawOrb',   function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });
    wrap('drawBubble',function(a){ return {x:a[1],y:a[2]}; });                                // (x,y,r,t) signature
    wrap('drawPlat',  function(a){ return a[1]?{x:a[1].x,y:a[1].y}:null; });
    wrap('drawBuddy', function(a){ return {x:a[1],y:a[2]}; });
    P.__psBig=1;
  }
  // Scale the food's physics radius ONCE per candy (candy is re-created each level) so the collision
  // body matches the enlarged visual — collision here is centre-based so this stays gameplay-accurate.
  function bigFoodHitbox(){
    try{ var c=W.__ps && W.__ps.g && W.__ps.g.candy;
      if(c && !c.__psBigR && typeof c.r==='number'){ c.r = c.r * FOOD_R; c.__psBigR = 1; } }catch(e){}
  }
  // Remove the GRP/publisher credit from game UI (Ronen's standing rule — legal page only).
  function hideCredit(){
    try{ var els=D.querySelectorAll('span,div,p');
      for(var i=0;i<els.length;i++){ var el=els[i]; if(el.children.length) continue;
        if(el.closest && el.closest('#ps-xpromo')) continue;   // our cross-promo INTENTIONALLY names the studio
        var t=(el.textContent||'').trim();
        if(/GRP Addictive|The Machine Games|by GRP/i.test(t) && el.style.display!=='none') el.style.setProperty('display','none','important');
      } }catch(e){}
  }

  // idempotent font enlarge: stash original once, always set original*scale (never compounds)

    var o=el.getAttribute('data-ps-fs');
    if(o==null){ o=parseFloat(getComputedStyle(el).fontSize)||0; el.setAttribute('data-ps-fs', o); }
    if(o>7) el.style.setProperty('font-size', (o*scale).toFixed(1)+'px', 'important');
  }
  function tightenMargins(el){
    ['data-ps-mt','marginTop','margin-top'];
    var mt=el.getAttribute('data-ps-mt'), mb=el.getAttribute('data-ps-mb'), cs=getComputedStyle(el);
    if(mt==null){ mt=parseFloat(cs.marginTop)||0; el.setAttribute('data-ps-mt', mt); }

  // (2) GLOBAL TYPOGRAPHY — EVERY screen, self-fitting.
  // Replaces the old title-only bigMenu(). That version gated on screen==='title' AND only walked
  // the menu subtree found via the PLAY button, which is exactly why the onboarding, level-select,
  // score and settings screens still read tiny — they were never touched. Buttons get their own
  // (larger) scale because enlarging a button's box without its LABEL is what made them look small.
  var BTN_FS = 2.00;   // button label text
  var TXT_FS = 1.75;   // body / UI text
  // The 1280x720 design box every screen renders inside.
  function screenRoot(){
    var ds=D.getElementsByTagName('div');

  // still fits, and nothing is ever cut off. Never steps back up, so it settles instead of oscillating.

  // exclude its tiles from the generic pass, then size it properly in selectGridFix().
  function selectGrid(){
    if((W.__ps && W.__ps.state && W.__ps.state.screen) !== 'select') return null;

        if(n >= 12) return divs[i];   // the level grid (12+ tiles); not the small stats/bundle grids
      }
    }
    return null;
  }
  function bigText(){
    try{
      var scr = (W.__ps && W.__ps.state && W.__ps.state.screen) || '?';
      if(scr === 'playing') return;                 // gameplay HUD is bigHUD()'s job
      // The 'intro' onboarding is a DESIGNED narrative panel (title + copy sized to fit its dark box).
      // Blindly enlarging its fonts blew the title OUT of the panel (Ronen: "text outside its
      // container"). Leave the intro's own type alone — fitPanel() already scales the whole panel as a
      // unit to the viewport, preserving the title↔panel proportions so nothing overflows.
      if(scr === 'intro') return;
      var root = screenRoot(); if(!root) return;
      if(fsAdj[scr] == null) fsAdj[scr] = 1;
      var grid = selectGrid();                      // skip level tiles — selectGridFix() sizes them

      for(var i=0;i<els.length;i++){
        if(grid && grid.contains(els[i])) continue;
        grow(els[i], (isBtn(els[i]) ? BTN_FS : TXT_FS) * k); tightenMargins(els[i]);
      }
    }catch(e){}
  }

  // (2c) LEVEL-SELECT GRID — bigger, legible, NON-overlapping, scrollable for all 150 levels.
  // Root cause of the overlap was the tiles' FIXED height (clamp(86,13vw,120)) + our font growth:
  // enlarged content overflowed the fixed box into neighbouring rows. Fix: responsive columns +
  // AUTO row height (tiles grow to fit their content, so rows can never overlap) + internal scroll,
  // then a controlled, matched enlargement of the tile number/name/stars/time.
  function selectGridFix(){
    try{
      var grid = selectGrid(); if(!grid) return;
      grid.style.setProperty('grid-template-columns','repeat(auto-fill, minmax(clamp(84px,15vw,120px), 1fr))','important');
      grid.style.setProperty('gap','10px','important');
      grid.style.setProperty('max-height','74vh','important');
      grid.style.setProperty('overflow-y','auto','important');
      var tiles = grid.children;
      for(var i=0;i<tiles.length;i++){
        var t = tiles[i]; if(t.tagName !== 'BUTTON') continue;
        t.style.setProperty('height','auto','important');            // AUTO height => no overflow => no overlap
        t.style.setProperty('min-height','clamp(94px,15vw,130px)','important');
        t.style.setProperty('padding','12px 6px','important');
        t.style.setProperty('justify-content','center','important');
        var k = t.children;                                          // [0]=number [1]=name [2]=stars [3]=best time
        if(k[0]) grow(k[0], 1.55);   // level number — big & clearly legible
        if(k[1]) grow(k[1], 1.30);   // level name
        if(k[2]) grow(k[2], 1.35);   // star row
        if(k[3]) grow(k[3], 1.45);   // best time
      }
    }catch(e){}
  }

  // (2b) FIT PANEL — guarantees nothing is ever clipped.
  // The onboarding/first screen is intrinsically TALLER than the 720 design box (measured 773px),
  // so it overflowed BOTH ends and the box's overflow:hidden cut off "MAX'S STORY" at the top and
  // "Skip intro" at the bottom. Shrinking the FONT cannot fix this — the height comes from fixed
  // artwork/spacing, not text. Instead scale the whole panel about its centre by just enough to
  // fit, which preserves the layout's proportions and fixes top and bottom symmetrically.
  // NOTE: scrollHeight is unaffected by transforms, so measuring while scaled is stable (no
  // measure/clear/re-measure thrash, no flicker) and this stays idempotent.
  function fitPanel(){
    try{
      var scr = (W.__ps && W.__ps.state && W.__ps.state.screen) || '?';
      if(scr === 'playing') return;                 // never touch gameplay
      if(scr === 'select') return;                  // grid handles its own height via internal scroll
      var root = screenRoot(); if(!root) return;
      for(var i=0;i<root.children.length;i++){
        var ch = root.children[i];
        if(!ch.offsetHeight || ch.tagName === 'CANVAS') continue;   // never transform the game canvas
        // Measure the CONTENT UNION, not the box. The intro panel's box is 720 but its children are
        // laid out from ABOVE its top edge down past its bottom (scrollHeight 978), so the overflow
        // is not centred — scaling about the box centre left the top item at y=-56, still clipped.
        // offsetTop/offsetHeight are LAYOUT values and are unaffected by transforms, so we can
        // measure while already scaled: no clear/re-measure, no flicker, fully idempotent.
        var minT = Infinity, maxB = -Infinity, kids = ch.children;
        for(var q=0;q<kids.length;q++){
          var n = kids[q]; if(!n.offsetHeight) continue;
          if(n.offsetTop < minT) minT = n.offsetTop;
          if(n.offsetTop + n.offsetHeight > maxB) maxB = n.offsetTop + n.offsetHeight;
        }
        if(!isFinite(minT) || maxB <= minT){ continue; }
        var need = maxB - minT;
        if(need > 722){
          // scale to fit, then translate so the content's TOP lands at the box top.
          // origin 50% 0 => a local y maps to (t + y*k); we want minT -> 0, so t = -minT*k.
          var k = Math.max(0.45, 716 / need);
          var t = -minT * k;
          ch.style.setProperty('transform','translateY('+t.toFixed(1)+'px) scale('+k.toFixed(3)+')','important');
          ch.style.setProperty('transform-origin','50% 0','important');
          ch.setAttribute('data-ps-fit','1');
        } else if(ch.getAttribute('data-ps-fit')){
          ch.style.removeProperty('transform');      // only ever clear a transform WE set
          ch.removeAttribute('data-ps-fit');
        }
      }
    }catch(e){}
  }

  // (3) HUD — enlarge the level pill / timer text and the round control buttons, in place.
  function bigHUD(){
    try{
      if(!(W.__ps && W.__ps.state && W.__ps.state.screen==='playing')) return;
      var ds=D.getElementsByTagName('div'), stage=null;
      for(var i=0;i<ds.length;i++){ if(ds[i].offsetWidth===1280 && ds[i].offsetHeight===720){ stage=ds[i]; break; } }
      if(!stage || !stage.children[1]) return;
      var bar=stage.children[1], els=bar.querySelectorAll('*');
      for(var j=0;j<els.length;j++){ var el=els[j];
        // round icon buttons (top-right restart / levels / music) — Ronen: too small. Size them
        // INTRINSICALLY (width/height in the game's own coords, NOT a container transform) to a clear
        // tap target, and scale their glyph to match. data-ps-w holds the TRUE natural width (stashed
        // once) so this is idempotent and never compounds.
        var r=el.getBoundingClientRect(), cs=getComputedStyle(el);
        var round = r.width>18 && Math.abs(r.width-r.height)<8 && parseFloat(cs.borderRadius)>=r.width*0.4;
        if(round){
          var w=el.getAttribute('data-ps-w'); if(w==null){ w=el.offsetWidth; el.setAttribute('data-ps-w', w); }
          w=parseFloat(w)||el.offsetWidth;
          if(w>0){
            var sz=Math.max(w*2.6, 120);                    // SUBSTANTIALLY bigger, min 120 design px
            el.style.setProperty('width', sz.toFixed(0)+'px','important');
            el.style.setProperty('height', sz.toFixed(0)+'px','important');
            el.style.setProperty('flex','0 0 auto','important');   // hold the bigger size in the flex row
            grow(el, Math.min(sz/w, 3.0));                  // glyph fills the bigger button
          }
        } else {
          grow(el, HUD_FS);                                 // timer / level pill text
        }
      }
    }catch(e){}
  }

  // (4) NO SIZE-POP ON END-OF-ROUND SCREENS.
  // The results / game-over / high-score card uses `animation:psPopIn` (scale .2 -> 1.12 -> 1), so it
  // "appears small first then pops to large" — and our font enlargement (bigText) landing a frame
  // later made it a visible size JUMP. On those screens, swap the scale-from-small entrance for a
  // scale-FREE fade: the card is at its FINAL size on the very first paint and only its opacity
  // animates. Combined with the synchronous apply below (grow runs in the observer microtask, before
  // paint), the card settles at its large final size with no small-then-large flash. Other screens
  // (intro, etc.) keep psPopIn untouched — only end-of-round screens were flagged.
  var RESULT_SCREENS = { won:1, failed:1, unlock:1 };
  function curScr(){ return (W.__ps && W.__ps.state && W.__ps.state.screen) || '?'; }
  // Kill the scale-from-small POP at the KEYFRAME level, not per element. A per-element animation
  // swap raced React: when it re-created the results card node (animating stars), the fresh node got
  // psPopIn back and our swap missed it — verified landscape still scaled all the way to settled.
  // Instead, while on an end-of-round screen, REDEFINE @keyframes psPopIn to an opacity-only fade
  // (no transform). Same keyframe NAME, last in document order, wins for EVERY element using it —
  // current or future — so React re-renders can't defeat it and there is no timing window. The card
  // is at its final size on the first painted frame; the opacity fade also masks the 1-frame
  // font-enlargement settle (the card is still near-transparent while bigText lands). Scoped to
  // result screens (injected on enter, removed on leave) so intro/other psPopIn users are untouched.
  function noPopResults(){
    try{
      // BULLETPROOF, no race: inject the opacity-only psPopIn override UNCONDITIONALLY from the very
      // first tick (page load), and keep it as the LAST style in the document so its @keyframes always
      // wins the name — for EVERY element using psPopIn, present or future. Previously this was gated
      // on the result screen, which left a 1-2 frame window where the card could render with the
      // scale-from-small psPopIn before the override was injected — that's the residual "small then
      // large" pop. Injecting it globally up-front removes the window entirely. (Intro's psPopIn also
      // becomes a gentle fade — unobjectionable, and Ronen wants ZERO scale pops.)
      var host = D.body || D.documentElement;
      var kf = D.getElementById('ps-popin-soft');
      if(!kf){
        kf = D.createElement('style'); kf.id = 'ps-popin-soft';
        kf.textContent = '@keyframes psPopIn{0%{transform:none;opacity:0}100%{transform:none;opacity:1}}';
        host.appendChild(kf);
      } else if(kf !== host.lastElementChild){
        host.appendChild(kf);   // keep it LAST so our keyframe definition always wins
      }
    }catch(e){}
  }

  // (5) SINGLE-PRODUCT STORE — one clean offer, no confusing multi-item "bundle".
  // The store card renders a 5-game icon grid (#ps-bundle) + an "Unlock the bundle" button. Strategy
  // for a casual game: ONE obvious purchase. Hide the game grid, relabel the button to the single
  // "Remove Ads & Unlock All — $3.99" offer, and de-reference "plus every game below" in the blurb.
  // DOM-level (the store markup is in the minified bundle); the button's onclick is a property and
  // survives innerHTML changes, so the real Stripe purchase handler is untouched.
  function storeClean(){
    try{
      var grid = D.getElementById('ps-bundle');
      if(grid && grid.style.display !== 'none') grid.style.setProperty('display','none','important');
      var els = D.querySelectorAll('button, div, span, p');
      for(var i=0;i<els.length;i++){
        var el = els[i], t = el.textContent || '';
        if(el.tagName === 'BUTTON' && /unlock the bundle/i.test(t) && !el.getAttribute('data-ps-relabel')){
          el.innerHTML = '⚡ Remove Ads &amp; Unlock All — $3.99';
          el.setAttribute('data-ps-relabel','1');
        }
        if(el.children.length === 0 && /plus every game below/i.test(t) && !el.getAttribute('data-ps-reblurb')){
          el.textContent = 'Remove ads and unlock all 50 levels — a one-time lifetime unlock.';
          el.setAttribute('data-ps-reblurb','1');
        }
      }
    }catch(e){}
  }

  // (6) BOTTOM HINT STRIP — the gameplay tip pill ("Drag across the rope to slice it!") was tiny.
  // Enlarge its font INTRINSICALLY (not a transform). Idempotent via grow()'s stashed original.
  function bigHint(){
    try{
      if(curScr() !== 'playing') return;
      var els=D.querySelectorAll('div,span,p');
      for(var i=0;i<els.length;i++){
        var el=els[i]; if(el.children.length) continue;
        var t=(el.textContent||'').trim(); if(t.length<4) continue;
        if(/\b(slice|drag|swipe|bubble|rope|retry|tap|pop|cut)\b/i.test(t)){
          var r=el.getBoundingClientRect();
          if(r.top > W.innerHeight*0.62){ grow(el, 1.7); }   // only the BOTTOM hint strip
        }
      }
    }catch(e){}
  }

  function tick(){ wrapSprites(); bigFoodHitbox(); hideCredit(); noPopResults(); bigText(); selectGridFix(); storeClean(); bigHint(); fitPanel(); bigHUD(); }
  // Throttle: the game rewrites the timer text every frame (fires the observer rapidly); cap the DOM
  // scans to ~5x/sec so re-applying after a rebuild is never a per-frame cost. EXCEPTION: when the
  // SCREEN itself changes (e.g. -> 'won'), apply IMMEDIATELY and synchronously — the observer callback
  // is a microtask that runs BEFORE the next paint, so scaling the new screen here means it is drawn
  // large on its first frame (no small-then-large pop). Then re-apply for a few animation frames to
  // catch elements the screen adds a beat later (animated stars/score), also before their paint.
  var _last=0, _lastScreen=null;
  function raf(f){ (W.requestAnimationFrame||function(g){ setTimeout(g,16); })(f); }
  function throttled(){
    var scr=curScr();
    if(scr!==_lastScreen){
      _lastScreen=scr; _last=Date.now(); tick();
      var n=5, pump=function(){ if(n--<=0) return; tick(); raf(pump); }; raf(pump);
      return;
    }
    var now=Date.now(); if(now-_last<200) return; _last=now; tick();
  }
  tick();
  setInterval(tick, 500);
  try { new MutationObserver(throttled).observe(D.documentElement, {childList:true, subtree:true}); } catch(e){}
})();
</script>
<!-- ===== Onboarding carousel (swipe + tappable dots) + Next-button lift + safe-area menu fit ===== -->
<script>
(function(){
  var W=window, D=document;
  function ps(){ return W.__ps; }
  function onIntro(){ var p=ps(); return !!(p && p.state && p.state.screen==='intro'); }
  var SLIDES=5;
  function beat(){ var p=ps(); return (p&&p.state&&typeof p.state.introBeat==='number')?p.state.introBeat:0; }
  function goTo(n){ var p=ps(); if(!p||!p.setState) return; n=Math.max(0,Math.min(SLIDES-1,n)); try{ p.setState({introBeat:n}); }catch(e){} }
  function next(){ var p=ps(); if(!p) return; if(beat()>=SLIDES-1){ try{ p.introNext&&p.introNext(); }catch(e){} } else goTo(beat()+1); }
  function prev(){ goTo(beat()-1); }

  // ---- swipe (touch + pointer) to move between slides ----
  var sx=0, sy=0, track=false;
  function start(x,y){ if(!onIntro()) return; sx=x; sy=y; track=true; }
  function end(x,y){ if(!track||!onIntro()){ track=false; return; } track=false; var dx=x-sx, dy=y-sy;
    if(Math.abs(dx)>42 && Math.abs(dx)>Math.abs(dy)*1.2){ if(dx<0) next(); else prev(); } }
  D.addEventListener('touchstart', function(e){ var t=e.touches&&e.touches[0]; if(t) start(t.clientX,t.clientY); }, {passive:true});
  D.addEventListener('touchend',  function(e){ var t=e.changedTouches&&e.changedTouches[0]; if(t) end(t.clientX,t.clientY); }, {passive:true});
  D.addEventListener('pointerdown', function(e){ start(e.clientX,e.clientY); });
  D.addEventListener('pointerup',   function(e){ end(e.clientX,e.clientY); });

  // ---- make the dot indicators interactive (tap a dot to jump to that slide) + lift Next/Skip ----
  function wireIntro(){
    if(!onIntro()) return;
    // dots: small round leaf elements in a horizontal row
    var dots=[];
    var all=D.querySelectorAll('div,span');
    for(var i=0;i<all.length;i++){ var d=all[i]; if(d.children.length) continue; var r=d.getBoundingClientRect(); if(!(r.width>=4&&r.width<=28&&Math.abs(r.width-r.height)<7&&r.top>0&&r.top<W.innerHeight)) continue; var cs=getComputedStyle(d); if(parseFloat(cs.borderRadius)>=r.width*0.35) dots.push(d); }
    if(dots.length>=3 && dots.length<=8){
      dots.sort(function(a,b){ return a.getBoundingClientRect().x-b.getBoundingClientRect().x; });
      dots.forEach(function(d,idx){ if(d.__psDot) return; d.__psDot=1;
        d.style.setProperty('cursor','pointer'); d.style.setProperty('pointer-events','auto');
        // enlarge each dot to a comfortable, tappable size (also more visible) — clean, no clip tricks
        d.style.setProperty('width','13px','important'); d.style.setProperty('height','13px','important');
        d.style.setProperty('border-radius','999px','important'); d.style.setProperty('box-sizing','border-box','important');
        var jump=function(ev){ if(ev){ev.stopPropagation(); ev.preventDefault&&ev.preventDefault();} goTo(idx); };
        d.addEventListener('click', jump, true); d.addEventListener('pointerup', jump, true); d.addEventListener('touchend', jump, true);
      });
    }
    // lift the Next / Skip buttons clear of the bottom edge + home indicator
    var btns=D.querySelectorAll('button,[role=button],a');
    for(var j=0;j<btns.length;j++){ var b=btns[j]; var t=(b.textContent||'').trim();
      if(/^next|^skip intro|skip ›/i.test(t)){ b.style.setProperty('margin-bottom','calc(env(safe-area-inset-bottom,0px) + 14px)','important'); }
    }
  }
  setInterval(wireIntro, 350);

  // ---- Safe-area menu fit: keep content clear of the bottom home indicator on notched devices ----
  function safeArea(){
    try{ var root=D.documentElement || D.body; if(!root) return;
      // expose insets as vars usable by any of our overrides; also nudge the body so a centred
      // column can't sit under the home indicator on landscape iPhones.
      D.body && D.body.style.setProperty('padding-bottom','env(safe-area-inset-bottom,0px)');
    }catch(e){}
  }
  safeArea();
})();
</script>
<!-- ===== Self-heal a device stuck on a stale/broken cached build (incl. home-screen PWA) ===== -->
<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  // Was a service worker ALREADY controlling this page when it loaded? If so, a later
  // controllerchange means a NEW worker (v13+) has taken over after clearing old caches —
  // reload ONCE so the fresh index.html is shown. If no controller existed (brand-new visit),
  // the first acquisition is normal startup, not an update, so don't reload (avoids a loop).
  var hadController = !!navigator.serviceWorker.controller;
  var reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if (reloaded) return;
    if (!hadController) { hadController = true; return; }
    reloaded = true;
    try { location.reload(); } catch(e){}
  });
  // Proactively check for a newer worker on every load so the update lands promptly.
  function poke(){ try { navigator.serviceWorker.getRegistration().then(function(r){ if(r){ try{ r.update(); }catch(e){} } }); } catch(e){} }
  navigator.serviceWorker.ready.then(poke);
  setTimeout(poke, 2000);
})();
</script>
